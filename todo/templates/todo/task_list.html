<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>

    <h1>Todo List</h1>

    <form method="POST">

        {% csrf_token %}

        <label>Task:</label>

<input type="text" name="title">

        <button type="submit">
            Add Task
        </button>

    </form>

    <br>

    <ul>

        {% for task in tasks %}

            <li>

                {{ task.title }}

                <a href="{% url 'update_task' task.id %}">
                    Edit
                </a>

                <a href="{% url 'delete_task' task.id %}">
                    Delete
                </a>

            </li>

        {% empty %}

            <li>No tasks yet.</li>

        {% endfor %}

    </ul>

</body>
</html>
